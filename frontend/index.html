<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BWU-BANK</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle at top right, rgba(201, 168, 76, 0.1), transparent 40%);
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: 1rem;
      animation: fadeInUp 0.5s ease forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    .logo-container {
      margin-bottom: 2rem;
    }
    .logo-container svg {
      width: 64px;
      height: 64px;
      fill: var(--accent);
      margin-bottom: 1rem;
    }
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .link {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--accent);
      font-size: 0.875rem;
      transition: color 0.2s;
    }
    .link:hover {
      color: var(--accent-hover);
    }
    #error-message {
      color: var(--red);
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="card text-center">
      <div class="logo-container">
        <!-- SVG Vault/Bank icon -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M4 10H6V17H4V10ZM10 10H14V17H10V10ZM2 19H22V21H2V19ZM18 10H20V17H18V10ZM12 2L2 7V9H22V7L12 2Z"></path>
        </svg>
        <h2>Welcome Back</h2>
        <p class="text-secondary mt-1">Sign in to your account</p>
      </div>

      <div id="error-message">Invalid PIN. Please try again.</div>

      <form id="loginForm">
        <div class="form-group">
          <label for="accountNumber">Account Number</label>
          <input type="text" id="accountNumber" class="form-control" placeholder="e.g. ACC12345678" required>
        </div>
        <div class="form-group">
          <label for="pin">PIN</label>
          <input type="password" id="pin" class="form-control" placeholder="••••" required>
        </div>
        <button type="submit" class="btn-primary mb-2">Sign In</button>
      </form>

      <a href="open-account.html" class="link">Open New Account</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
